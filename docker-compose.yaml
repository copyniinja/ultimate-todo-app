services:
  postgres:
    image: postgres:18.3-alpine3.23
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: super_secret
      POSTGRES_DB: app_db

  backend:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    env_file:
      - .env

    volumes:
      - ./logs:/app/logs

volumes:
  postgres:
